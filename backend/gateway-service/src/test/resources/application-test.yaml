spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:19999
              predicates:
                - Path=/api/v1/auth/**,/api/v1/users/**

app-gateway:
  open-paths:
    - /api/v1/auth/**
    - /actuator/health
  cors-allowed-origins:
    - "*"
  cors-allow-credentials: false

application:
  security:
    jwt:
      secret-key: "dGhpcy1pcy1hLXNlY3JldC1rZXktMzItYnl0ZXMhZXC"