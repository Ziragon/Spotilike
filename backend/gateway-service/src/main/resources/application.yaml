spring:
  application:
    name: gateway-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${SERVER_PORT:8000}
  shutdown: graceful

gateway:
  open-paths:
    - /api/v1/auth/**
    - /actuator/health

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:must-be-overridden}

logging:
  level:
    root: INFO