spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/user_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

application:
  security:
    jwt:
      secret-key: secret-key
      expiration: 900000

logging:
  level:
    root: INFO
    com.spotilike: DEBUG