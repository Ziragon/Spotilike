spring:
  application:
    name: user-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 16
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  jackson:
    default-property-inclusion: non_null # Удаление нулл полей
    serialization:
      write-dates-as-timestamps: false # Преобразование даты
    deserialization:
      fail-on-unknown-properties: false # Пропуск неизвестных значений от фронта

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:must-be-overridden}
      expiration: 900000 # 15 минут
      refresh-token:
        expiration: 604800000 # 7 дней

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO